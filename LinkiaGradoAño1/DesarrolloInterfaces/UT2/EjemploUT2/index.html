<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8"> <!--Codificacion-->
        <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!--Como preparar la pagina-->
        <title>Document</title>
        <script src="index.js" defer></script> <!--Para que sepa etiquetas-->
    </head>
    <body> <!--Cuerpo de la página-->
        <button id="boton-saludar">Boton</button>
        <form id="registroForm" novalidate>
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" name="nombre" required>
          <div id="errorNombre" class="error"></div>      
          <label for="correo">Correo electrónico</label>
          <input type="email" id="correo" name="correo" required>
          <div id="errorEmail" class="error"></div>      
          <label for="contraseña">Contraseña</label>
          <input type="password" id="contraseña" name="contraseña" required>
          <div id="errorPassword" class="error"></div>      
          <button type="submit">Registrarse</button>
          <div id="resultado" class="success"></div>
        </form>

    </body>
